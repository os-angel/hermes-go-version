name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}_${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o hermes-go${{ matrix.ext }} ./cmd/agent

      - name: Package binary (Linux/macOS)
        if: matrix.os != 'windows'
        run: |
          tar -czf hermes-go_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
            hermes-go LICENSE README.md

      - name: Package binary (Windows)
        if: matrix.os == 'windows'
        run: |
          zip hermes-go_windows_${{ matrix.arch }}.zip \
            hermes-go.exe LICENSE README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-go_${{ matrix.os }}_${{ matrix.arch }}
          path: hermes-go_*

  package-bridge:
    name: Package bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package bridge (tar.gz)
        run: |
          tar -czf bridge.tar.gz bridge/

      - name: Package bridge (zip, para Windows)
        run: |
          zip -r bridge.zip bridge/

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge
          path: bridge.*

  release:
    name: Publish release
    needs: [build, package-bridge]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: hermes-go ${{ github.ref_name }}
          body: |
            ## Instalacion

            **Linux / macOS / WSL:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            iex (irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1)
            ```

            ## Requisitos

            - Node.js >= 18 (para el bridge de WhatsApp)

            ## Changelog

            Ver commits desde la version anterior.
          files: dist/**
          draft: false
          prerelease: false
